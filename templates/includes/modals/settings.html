<div id="settingsModal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-start justify-center z-50">
  <div class="modal-overlay absolute inset-0 bg-gray-900 opacity-50"></div>

  <!-- Modal Container (smaller + top-aligned + scrollable if content overflows) -->
  <div class="modal-container bg-white dark:bg-gray-800 w-11/12 md:max-w-md mx-auto mt-10 rounded-2xl shadow-lg z-50 overflow-y-auto max-h-[80vh]">
    <div class="modal-content py-4 text-left px-6">
      <!-- Header -->
      <div class="flex justify-between items-center pb-3">
        <p class="text-lg font-bold text-gray-900 dark:text-white">Settings</p>
        <button class="close-modal text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 transition-colors"
                onclick="Modal.close('settingsModal')">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- Tabs -->
      <div class="border-b border-gray-200 dark:border-gray-700 mb-4">
        <div class="flex">
          <button id="generalTab" class="px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600 dark:text-blue-400"
                  onclick="settingsManager.switchTab('general')">General</button>
        </div>
      </div>

      <!-- General Settings -->
      <div id="generalSettings" class="settings-tab">
        <h3 class="text-base font-medium text-gray-900 dark:text-white mb-3">Theme</h3>
        <div class="space-y-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-lg border border-gray-200 dark:border-gray-600">
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="theme" value="system" id="theme_system" class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
            <span class="text-gray-900 dark:text-gray-100 text-sm">System Default</span>
          </label>
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="theme" value="light" id="theme_light" class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
            <span class="text-gray-900 dark:text-gray-100 text-sm">Light Mode</span>
          </label>
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="theme" value="dark" id="theme_dark" class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
            <span class="text-gray-900 dark:text-gray-100 text-sm">Dark Mode</span>
          </label>
        </div>
      </div>

      <!-- Footer -->
      <div class="flex justify-end space-x-2 mt-4 pt-3 border-t border-gray-200 dark:border-gray-700">
        <button type="button" class="px-3 py-1.5 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700"
                onclick="Modal.close('settingsModal')">Cancel</button>
        <button type="button" class="px-3 py-1.5 bg-blue-600 rounded-lg text-sm font-medium text-white hover:bg-blue-700"
                onclick="settingsManager.saveSettings()">Save</button>
      </div>
    </div>
  </div>
</div>
