<!-- Delete All Events Confirmation Modal -->
<div id="deleteAllModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
  <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50" style="pointer-events: none;"></div>
  <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-lg z-50 overflow-y-auto">
    <div class="modal-content py-4 text-left px-6">
      <div class="flex justify-between items-center pb-3">
        <p class="text-2xl font-bold text-gray-900">Delete All Events</p>
      </div>
      
      <div class="my-6">
        <div class="flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mx-auto mb-4">
          <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
        </div>
        <h3 class="text-lg font-medium text-gray-900 text-center mb-2">Delete All Events?</h3>
        <p class="text-gray-500 text-center">You are about to delete <span id="deleteAllEventCount" class="font-semibold text-gray-900">0</span> detection events. This action will permanently remove all events and cannot be undone.</p>
      </div>
      
      <div class="flex justify-center space-x-3 mt-6 pt-4 border-t border-gray-200">
        <button type="button" class="px-4 py-2 border border-gray-300 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors" onclick="closeDeleteAllModal()">
          Cancel
        </button>
        <button type="button" id="confirmDeleteAll" class="px-4 py-2 bg-red-600 border border-transparent rounded-xl text-sm font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
          Delete All Events
        </button>
      </div>
    </div>
  </div>
</div>
