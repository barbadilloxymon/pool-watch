<!-- Delete Account Modal -->
<div id="deleteAccountModal" class="modal">
  <div class="modal-content" style="max-width: 500px;">
    <div class="bg-red-600 p-6 rounded-t-xl">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-white">Delete Account</h2>
        <button onclick="closeDeleteAccountModal()" class="text-white hover:text-gray-200 transition-colors focus:outline-none">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
    </div>

    <div class="p-6">
      <div class="flex items-start mb-4">
        <i class="fas fa-exclamation-triangle text-red-500 text-xl mr-3 mt-1"></i>
        <div>
          <h3 class="text-lg font-semibold text-gray-900 mb-2">This action cannot be undone</h3>
          <p class="text-sm text-gray-600">
            This will permanently delete your account and remove all your data from our servers. 
            Please be certain.
          </p>
        </div>
      </div>

      <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
        <p class="text-sm text-red-700 font-medium mb-2">
          To confirm, enter your password:
        </p>
        <div class="relative">
          <input 
            type="password" 
            id="deleteConfirmPassword" 
            class="w-full px-3 py-2 pr-10 border border-red-300 rounded focus:ring-2 focus:ring-red-500 focus:border-transparent focus:outline-none"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button 
            type="button" 
            onclick="togglePasswordVisibility('deleteConfirmPassword')"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
          >
            <i id="deleteConfirmPassword-icon" class="fas fa-eye"></i>
          </button>
        </div>
        <div id="deleteConfirmError" class="text-red-600 text-sm mt-2 hidden">
          <i class="fas fa-exclamation-circle mr-1"></i>
          <span></span>
        </div>
      </div>

      <div class="flex gap-3">
        <button 
          onclick="closeDeleteAccountModal()" 
          class="flex-1 px-4 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-gray-500"
        >
          Cancel
        </button>
        <button 
          onclick="deleteAccount()" 
          id="deleteAccountBtn"
          class="flex-1 px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-red-500"
        >
          Delete Account
        </button>
      </div>
    </div>
  </div>
</div>
