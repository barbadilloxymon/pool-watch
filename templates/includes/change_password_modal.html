<!-- Change Password Modal -->
<div id="changePasswordModal" class="modal">
  <div class="modal-content" style="max-width: 500px;">
    <div class="p-6 rounded-t-xl">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-gray-800">Change Password</h2>
        <button onclick="closeChangePasswordModal()" class="close-modal focus:outline-none text-gray-400 hover:text-gray-500 transition-colors">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
    </div>

    <div class="border-b border-gray-200"></div>
    <div class="p-6">
      <div class="space-y-4">
        <!-- Current Password -->
        <div>
          <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-1">
            Current Password
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="currentPassword" 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              placeholder="Enter current password"
            >
            <button 
              type="button" 
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
              onclick="togglePasswordVisibility('currentPassword')"
            >
              <i class="fas fa-eye" id="currentPassword-icon"></i>
            </button>
          </div>
          <div id="currentPasswordError" class="error-message hidden"></div>
        </div>

        <!-- New Password -->
        <div>
          <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">
            New Password
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="newPassword" 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              placeholder="Enter new password"
            >
            <button 
              type="button" 
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
              onclick="togglePasswordVisibility('newPassword')"
            >
              <i class="fas fa-eye" id="newPassword-icon"></i>
            </button>
          </div>
          <div id="newPasswordError" class="error-message hidden"></div>
        </div>

        <!-- Confirm New Password -->
        <div>
          <label for="confirmNewPassword" class="block text-sm font-medium text-gray-700 mb-1">
            Confirm New Password
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="confirmNewPassword" 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              placeholder="Confirm new password"
            >
            <button 
              type="button" 
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
              onclick="togglePasswordVisibility('confirmNewPassword')"
            >
              <i class="fas fa-eye" id="confirmNewPassword-icon"></i>
            </button>
          </div>
          <div id="confirmPasswordError" class="error-message hidden"></div>
        </div>
      </div>

      <div class="mt-6 flex gap-3">
        <button 
          onclick="closeChangePasswordModal()" 
          class="flex-1 px-4 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-medium"
        >
          Cancel
        </button>
        <button 
          onclick="changePassword()" 
          id="changePasswordBtn"
          class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
        >
          Change Password
        </button>
      </div>
    </div>
  </div>
</div>
